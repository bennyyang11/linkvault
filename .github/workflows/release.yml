name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -Ls -o replicated.tar.gz
          tar xf replicated.tar.gz replicated
          sudo mv replicated /usr/local/bin/replicated

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t bennyyang11/linkvault:${{ github.ref_name }} .
          docker push bennyyang11/linkvault:${{ github.ref_name }}

      - name: Scan Docker image for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bennyyang11/linkvault:${{ github.ref_name }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true

      - name: Package Helm chart
        run: |
          helm dependency update helm/linkvault/
          rm -f release/linkvault-*.tgz
          helm package helm/linkvault/ -d release/

      - name: Create release and promote to Unstable
        env:
          REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
          REPLICATED_APP: linkvault
        run: |
          replicated release create \
            --yaml-dir release/ \
            --promote Unstable \
            --version ${GITHUB_REF_NAME#v}
