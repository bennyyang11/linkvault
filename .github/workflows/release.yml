name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version
        id: version
        run: echo "version=1.3.0+$(date +%Y%m%d).$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t bennyyang11/linkvault:${{ steps.version.outputs.version }} .
          docker push bennyyang11/linkvault:${{ steps.version.outputs.version }}

      - name: Scan Docker image for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bennyyang11/linkvault:${{ steps.version.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true

      - name: Re-checkout after Trivy
        uses: actions/checkout@v6

      - name: Package Helm chart
        run: |
          rm -f release/linkvault-*.tgz
          helm dependency update helm/linkvault/
          helm package helm/linkvault/ -d release/

      - name: Create release and promote to Unstable
        uses: replicatedhq/replicated-actions/create-release@v1
        with:
          app-slug: linkvault-lynx
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: release/
          promote-channel: Unstable
          version: ${{ steps.version.outputs.version }}
