<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Collection — LinkVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen antialiased">

    <div class="max-w-2xl mx-auto px-4 py-12">
        <!-- Header -->
        <div class="mb-8">
            <a href="/" class="inline-flex items-center gap-1.5 text-sm text-slate-400 hover:text-slate-600 transition-colors mb-6">
                <div class="w-5 h-5 bg-blue-600 rounded-md flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                </div>
                LinkVault
            </a>
            <div class="flex items-start gap-3">
                <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5">
                    <svg class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/></svg>
                </div>
                <div>
                    <h1 id="col-name" class="text-2xl font-bold text-slate-900">Loading…</h1>
                    <p id="col-desc" class="text-slate-500 mt-0.5"></p>
                    <p id="col-meta" class="text-xs text-slate-400 mt-1"></p>
                </div>
            </div>
        </div>

        <!-- Bookmark list -->
        <div id="bookmark-list" class="space-y-2"></div>
    </div>

    <script>
        const code = window.location.pathname.split('/').pop();

        fetch('/api/shared/' + code)
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('col-name').textContent = 'Not Found';
                    document.getElementById('col-desc').textContent = 'This collection does not exist or is not public.';
                    return;
                }
                document.title = data.name + ' — LinkVault';
                document.getElementById('col-name').textContent = data.name;
                document.getElementById('col-desc').textContent = data.description || '';
                const count = data.bookmarks?.length || 0;
                document.getElementById('col-meta').textContent = count + ' bookmark' + (count !== 1 ? 's' : '');

                const list = document.getElementById('bookmark-list');
                if (!data.bookmarks?.length) {
                    list.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-16 text-center">
                            <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center mb-3">
                                <svg class="w-6 h-6 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-4-7 4V5z"/></svg>
                            </div>
                            <p class="text-sm text-slate-400">This collection is empty.</p>
                        </div>`;
                    return;
                }

                list.innerHTML = data.bookmarks.map(b => {
                    const domain = (() => { try { return new URL(b.url).hostname; } catch { return b.url; } })();
                    const tagsHtml = (b.tags || []).map(t =>
                        `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-blue-50 text-blue-700">#${esc(t)}</span>`
                    ).join('');
                    const favicon = b.favicon_url
                        ? `<img src="${esc(b.favicon_url)}" class="w-4 h-4 rounded" onerror="this.outerHTML='<div class=\\'w-4 h-4 rounded bg-slate-200\\'></div>'">`
                        : `<div class="w-4 h-4 rounded bg-slate-200"></div>`;
                    return `
                        <div class="bg-white border border-slate-200 rounded-xl p-4 hover:border-slate-300 hover:shadow-sm transition-all">
                            <div class="flex items-start gap-3">
                                <div class="mt-0.5 flex-shrink-0">${favicon}</div>
                                <div class="flex-1 min-w-0">
                                    <a href="${esc(b.url)}" target="_blank" rel="noopener noreferrer" class="text-sm font-semibold text-slate-900 hover:text-blue-600 transition-colors truncate block">${esc(b.title || b.url)}</a>
                                    <p class="text-xs text-slate-400 truncate mt-0.5">${esc(domain)}</p>
                                    ${b.description ? `<p class="text-xs text-slate-500 mt-1.5 line-clamp-2">${esc(b.description)}</p>` : ''}
                                    ${tagsHtml ? `<div class="flex flex-wrap gap-1 mt-2">${tagsHtml}</div>` : ''}
                                </div>
                            </div>
                        </div>`;
                }).join('');
            })
            .catch(() => {
                document.getElementById('col-name').textContent = 'Error';
                document.getElementById('col-desc').textContent = 'Failed to load collection.';
            });

        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
</body>
</html>
