apiVersion: v2
name: linkvault
description: A bookmark manager with tagging, collections, and public sharing
type: application
version: 2.1.4
appVersion: "2.1.4"

dependencies:
  - name: postgresql
    version: "16.4.1"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: redis
    version: "20.6.1"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

  - name: replicated
    version: "1.x.x"
    repository: oci://registry.replicated.com/library
    alias: linkvault-sdk
