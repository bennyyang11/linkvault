replicaCount: 1

image:
  repository: proxy.replicated.com/proxy/linkvault-lynx/index.docker.io/bennyyang11/linkvault
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  nodePort: ""

ingress:
  enabled: false
  host: ""
  className: nginx
  annotations: {}
  tls:
    enabled: false
    certManager:
      enabled: false
      issuerName: "letsencrypt-prod"
      issuerKind: "ClusterIssuer"
    secretName: ""
    selfSigned: false

config:
  pollIntervalSeconds: "10"
  reportIntervalSeconds: "60"
  updateCheckIntervalSeconds: "300"

# --- Embedded PostgreSQL (Bitnami subchart) ---
# Don't override image registry — let the subchart use its own defaults
postgresql:
  enabled: true
  auth:
    postgresPassword: "linkvault-default-pw"
    database: "linkvault"
  primary:
    persistence:
      size: 1Gi

# BYO PostgreSQL
externalPostgresql:
  host: ""
  port: "5432"
  user: "postgres"
  password: ""
  database: "linkvault"
  existingSecret: ""

# --- Embedded Redis (Bitnami subchart) ---
# Don't override image registry — let the subchart use its own defaults
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

# BYO Redis
externalRedis:
  host: ""
  port: "6379"
  password: ""
  existingSecret: ""

# --- Global settings ---
global:
  security:
    allowInsecureImages: true
  imagePullSecrets:
    - name: enterprise-pull-secret
  replicated:
    licenseID: ""
