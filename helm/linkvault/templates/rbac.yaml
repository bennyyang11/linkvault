apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "linkvault.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "linkvault.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "linkvault.fullname" . }}-support-bundle
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "pods", "pods/log", "services", "namespaces", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["troubleshoot.sh"]
    resources: ["*"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "linkvault.fullname" . }}-support-bundle
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "linkvault.fullname" . }}-support-bundle
subjects:
  - kind: ServiceAccount
    name: {{ include "linkvault.fullname" . }}
    namespace: {{ .Release.Namespace }}
