apiVersion: embeddedcluster.replicated.com/v1beta1
kind: Config
spec:
  version: ""
  domains:
    replicatedAppDomain: get.linkvault.dev
    proxyRegistryDomain: proxy.linkvault.dev
  unsupportedOverrides:
    kubelet:
      maxPods: 110
      maxParallelImagePulls: 5
    kotsadm:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  extensions:
    helm:
      repositories:
        - name: ingress-nginx
          url: https://kubernetes.github.io/ingress-nginx
      charts:
        - name: ingress-nginx
          chartname: ingress-nginx/ingress-nginx
          namespace: ingress-nginx
          version: "4.12.0"
          values: |
            controller:
              service:
                type: NodePort
                nodePorts:
                  http: "80"
                  https: "443"
              image:
                digest: ""
                digestChroot: ""
              admissionWebhooks:
                patch:
                  image:
                    digest: ""
