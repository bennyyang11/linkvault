apiVersion: embeddedcluster.replicated.com/v1beta1
kind: Config
spec:
  version: "3.0.0-alpha-31+k8s-1.34"
  domains:
    proxyRegistryDomain: proxy.link-vaults.com
  unsupportedOverrides:
    k0s: |
      config:
        spec:
          workerProfiles:
          - name: custom-settings
            values:
              maxPods: 110
              maxParallelImagePulls: 5
  extensions:
    helmCharts:
      - chart:
          name: ingress-nginx
          chartVersion: "4.12.0"
        releaseName: ingress-nginx
        namespace: ingress-nginx
        values: |
          controller:
            service:
              type: NodePort
              nodePorts:
                http: "80"
                https: "443"
            image:
              digest: ""
              digestChroot: ""
            admissionWebhooks:
              patch:
                image:
                  digest: ""
